<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TR to Finary{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="{{ page }}">
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">TR</div>
                <div class="logo-text">
                    TR to Finary
                    <span>Portfolio Sync</span>
                </div>
            </div>
            <nav>
                <a href="/" class="nav-item {% if page == 'dashboard' %}active{% endif %}">
                    <span class="nav-icon">&#127968;</span> Dashboard
                </a>
                <a href="/sync" class="nav-item {% if page == 'sync' %}active{% endif %}">
                    <span class="nav-icon">&#128260;</span> Sync
                </a>
                <a href="/transactions" class="nav-item {% if page == 'transactions' %}active{% endif %}">
                    <span class="nav-icon">&#128203;</span> Transactions
                </a>
                <a href="/settings" class="nav-item {% if page == 'settings' %}active{% endif %}">
                    <span class="nav-icon">&#9881;</span> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="version">v0.1.0</div>
            </div>
        </aside>

        <!-- Main -->
        <div class="main fade-in">
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
